name: Build, Push, and Deploy Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BACKEND_IMAGE: worxbend/bounce-io-backend:latest
  FRONTEND_IMAGE: worxbend/bounce-io-frontend:latest
  DEPLOY_PATH: ~/bounce-io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server-go/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.BACKEND_IMAGE }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          source: docker-compose.yml
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy to Oracle compute instance
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          envs: DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            mkdir -p ~/bounce-io
            cd ~/bounce-io
            printf '%s' "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
