services:
  backend:
    image: worxbend/bounce-io-backend:latest
    build:
      context: .
      dockerfile: apps/server-go/Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      TICK_RATE: 60
      SNAPSHOT_RATE: 20
    expose:
      - "8787"
    restart: unless-stopped

  frontend:
    image: worxbend/bounce-io-frontend:latest
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        VITE_WS_URL: ${VITE_WS_URL:-}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped
